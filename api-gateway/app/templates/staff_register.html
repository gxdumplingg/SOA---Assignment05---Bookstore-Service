{% extends 'base.html' %}

{% block title %}Thêm nhân viên - Bookstore{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <h2 style="color: #1e40af; font-size: 2em; margin-bottom: 24px;">
        Thêm nhân viên
    </h2>

    <form method="post" style="background: #f8fafc; padding: 24px; border-radius: 10px; border: 1px solid #e2e8f0;">
        {% csrf_token %}
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Họ tên *</label>
            <input type="text" name="name" required
                style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Email *</label>
            <input type="email" name="email" required
                style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Vai trò</label>
            <input type="text" name="role" value="Nhân viên"
                style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Phòng ban</label>
            <input type="text" name="department" placeholder="(tùy chọn)"
                style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" style="padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Thêm nhân viên
            </button>
            <a href="{% url 'staff_book_list' %}" style="padding: 12px 24px; background: #e2e8f0; color: #475569; text-decoration: none; border-radius: 8px; font-weight: 600;">Quay lại</a>
        </div>
    </form>
</div>
{% endblock %}
