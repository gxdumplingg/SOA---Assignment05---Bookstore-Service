        '204': { description: No content }
        '404': { description: Not found }

  /api/publishers/:
    get:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Danh sách nhà xuất bản
      responses:
        '200':
          description: OK
