      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Category' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '400': { description: Validation error }

  /api/categories/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Chi tiết thể loại
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '404': { description: Not found }
    put:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Category' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '404': { description: Not found }
    patch:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Category' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '404': { description: Not found }
    delete:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
