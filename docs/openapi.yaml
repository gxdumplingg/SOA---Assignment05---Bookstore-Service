  # ========== CATALOG SERVICE (8006) - path /api/categories/ = server 8006/api + /categories/ ==========
  /categories/:
    get:
      tags: [Catalog]
      servers: [{ url: http://localhost:8006/api }]
      summary: Danh sách category (catalog)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CatalogCategory' }
    post:
      tags: [Catalog]
      servers: [{ url: http://localhost:8006/api }]
      requestBody:
        content:
          application/json:
