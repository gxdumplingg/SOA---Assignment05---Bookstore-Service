# Bookstore Microservices - API Documentation (OpenAPI 3.0)
# Dùng file này để generate Swagger UI (Swagger Editor, drf-spectacular, hoặc Swagger UI standalone)

openapi: 3.0.3
info:
  title: Bookstore Microservices API
  description: |
    Tài liệu API cho hệ thống nhà sách microservices.
    Mỗi nhóm API chạy trên một service (port) riêng; trong Swagger UI chọn đúng server theo tag hoặc dùng base URL tương ứng.
  version: 1.0.0
  contact:
    name: Bookstore Team

servers:
  - url: http://localhost:8001
    description: Customer Service
  - url: http://localhost:8002
    description: Cart Service
  - url: http://localhost:8003
    description: Book Service
  - url: http://localhost:8004
    description: Staff Service
  - url: http://localhost:8005
    description: Manager Service
  - url: http://localhost:8006
    description: Catalog Service
  - url: http://localhost:8006/api
    description: Catalog Service (base /api, dùng cho paths /categories/)
  - url: http://localhost:8007
    description: Order Service
  - url: http://localhost:8008
    description: Pay Service
  - url: http://localhost:8009
    description: Ship Service
  - url: http://localhost:8010
    description: Comment-Rate Service
  - url: http://localhost:8011
    description: Recommender AI Service

tags:
  - name: Customer
    description: Khách hàng & địa chỉ
  - name: Cart
    description: Giỏ hàng
  - name: Book
    description: Sách, thể loại, nhà xuất bản
  - name: Staff
    description: Nhân viên
  - name: Manager
    description: Quản lý
  - name: Catalog
    description: Danh mục (catalog-service)
  - name: Order
    description: Đơn hàng
  - name: Payment
    description: Thanh toán
  - name: Shipment
    description: Vận chuyển
  - name: Rating
    description: Đánh giá & bình luận sách
  - name: Recommender
    description: Gợi ý sách

paths:
  # ========== CUSTOMER SERVICE (8001) ==========
  /api/customers/:
    get:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Danh sách khách hàng
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Customer' }
    post:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Tạo khách hàng mới
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '400':
          description: Validation error

  /api/customers/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Chi tiết khách hàng
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404':
          description: Not found
    put:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Cập nhật khách hàng (full)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404': { description: Not found }
        '400': { description: Validation error }
    patch:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Cập nhật khách hàng (partial)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Customer' }
        '404': { description: Not found }
        '400': { description: Validation error }
    delete:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Xóa khách hàng
      responses:
        '204': { description: No content }
        '404': { description: Not found }

  /api/addresses/:
    get:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Danh sách địa chỉ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Address' }
    post:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Tạo địa chỉ
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '400': { description: Validation error }

  /api/addresses/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      summary: Chi tiết địa chỉ
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Address' } } } }
        '404': { description: Not found }
    put:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressCreate' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Address' } } } }
        '404': { description: Not found }
        '400': { description: Validation error }
    patch:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressCreate' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Address' } } } }
        '404': { description: Not found }
    delete:
      tags: [Customer]
      servers: [{ url: http://localhost:8001 }]
      responses:
        '204': { description: No content }
        '404': { description: Not found }

  # ========== CART SERVICE (8002) ==========
  /api/carts/:
    get:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Danh sách giỏ hàng
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cart' }
    post:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Tạo giỏ hàng (cho khách hàng)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id: { type: integer }
                items:
                  type: array
                  items: { $ref: '#/components/schemas/CartItemCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '400': { description: Validation error }

  /api/carts/customer/{customer_id}/:
    get:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Lấy giỏ hàng theo customer_id
      parameters:
        - name: customer_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '404':
          description: Cart not found for this customer

  /api/carts/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Chi tiết giỏ hàng
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Cart' } } } }
        '404': { description: Not found }
    put:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Cập nhật giỏ hàng
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Cart' } } } }
        '404': { description: Not found }
    delete:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Xóa giỏ hàng
      responses:
        '204': { description: No content }
        '404': { description: Not found }

  /api/carts/{id}/add-item/:
    post:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Thêm sách vào giỏ
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CartItemCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '404': { description: Not found }
        '400': { description: Validation error }

  /api/carts/{id}/remove-item/{item_id}/:
    delete:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Xóa một mục khỏi giỏ
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: item_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '404': { description: Item not found in cart }

  /api/carts/{id}/update-item/{item_id}/:
    put:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Cập nhật số lượng mục trong giỏ
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: item_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '404': { description: Item not found in cart }

  /api/carts/{id}/clear/:
    delete:
      tags: [Cart]
      servers: [{ url: http://localhost:8002 }]
      summary: Xóa toàn bộ mục trong giỏ
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '404': { description: Not found }

