                    score: { type: number, format: float }

components:
  schemas:
    # ----- Customer -----
    Customer:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        email: { type: string, format: email }
        fullname:
          type: object
          properties:
            id: { type: integer }
            full_name: { type: string }
        addresses:
          type: array
          items: { $ref: '#/components/schemas/Address' }
    CustomerCreate:
      type: object
      required: [name, email]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        fullname:
          type: object
          properties:
            full_name: { type: string }
        address:
          type: object
          properties:
            line1: { type: string }
            line2: { type: string }
            city: { type: string }
            state: { type: string }
            postal_code: { type: string }
            country: { type: string }
            is_default: { type: boolean }
    Address:
      type: object
      properties:
        id: { type: integer }
        customer: { type: integer }
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        state: { type: string }
        postal_code: { type: string }
        country: { type: string }
        is_default: { type: boolean }
    AddressCreate:
      type: object
      properties:
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        state: { type: string }
        postal_code: { type: string }
        country: { type: string }
        is_default: { type: boolean }

    # ----- Cart -----
    Cart:
      type: object
      properties:
        id: { type: integer }
        customer_id: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
    CartItem:
      type: object
      properties:
        id: { type: integer }
        book_id: { type: integer }
        quantity: { type: integer }
    CartItemCreate:
      type: object
      required: [book_id, quantity]
      properties:
        book_id: { type: integer }
        quantity: { type: integer, minimum: 1 }

    # ----- Book -----
    Book:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        author: { type: string }
        price: { type: number, format: decimal }
        description: { type: string }
        stock: { type: integer }
        category: { $ref: '#/components/schemas/Category' }
        publisher: { $ref: '#/components/schemas/Publisher' }
        created_at: { type: string, format: date-time }
    BookCreate:
      type: object
      properties:
        title: { type: string }
        author: { type: string }
        price: { type: number }
        description: { type: string }
        stock: { type: integer }
        category_id: { type: integer, nullable: true }
        publisher_id: { type: integer, nullable: true }
    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
    Publisher:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    # ----- Staff -----
    Staff:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        department: { type: string }
        is_active: { type: boolean }

    # ----- Manager -----
    Manager:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        level: { type: string }
        department: { type: string }
        is_active: { type: boolean }

    # ----- Catalog (catalog-service Category) -----
    CatalogCategory:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        is_active: { type: boolean }

    # ----- Order -----
    Order:
      type: object
      properties:
        id: { type: integer }
        customer_id: { type: integer }
        status: { type: string, enum: [PENDING, PAID, SHIPPED, CANCELLED] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
    OrderCreate:
      type: object
      required: [customer_id]
      properties:
        customer_id: { type: integer }
        status: { type: string, enum: [PENDING, PAID, SHIPPED, CANCELLED] }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItemCreate' }
    OrderItem:
      type: object
      properties:
        id: { type: integer }
        book_id: { type: integer }
        quantity: { type: integer }
        price: { type: number }
    OrderItemCreate:
      type: object
      required: [book_id, quantity, price]
      properties:
        book_id: { type: integer }
        quantity: { type: integer }
        price: { type: number }

    # ----- Payment -----
    Payment:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        amount: { type: number }
        method: { type: string, enum: [CASH, CARD, BANK] }
        status: { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED] }
        created_at: { type: string, format: date-time }
    PaymentCreate:
      type: object
      properties:
        order_id: { type: integer }
        amount: { type: number }
        method: { type: string, enum: [CASH, CARD, BANK] }
        status: { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED] }

    # ----- Shipment -----
    Shipment:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        method: { type: string, enum: [STANDARD, EXPRESS, PICKUP] }
        status: { type: string, enum: [PENDING, SHIPPED, DELIVERED, CANCELLED] }
        address: { type: string }
        created_at: { type: string, format: date-time }
    ShipmentCreate:
      type: object
      properties:
        order_id: { type: integer }
        method: { type: string, enum: [STANDARD, EXPRESS, PICKUP] }
        status: { type: string, enum: [PENDING, SHIPPED, DELIVERED, CANCELLED] }
        address: { type: string }

    # ----- Rating -----
    BookRating:
      type: object
      properties:
        id: { type: integer }
        customer_id: { type: integer }
        book_id: { type: integer }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BookRatingCreate:
      type: object
      required: [customer_id, book_id]
      properties:
        customer_id: { type: integer }
        book_id: { type: integer }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
