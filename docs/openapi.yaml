  /api/books/available/:
    get:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Sách còn hàng (stock > 0)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Book' }

  /api/books/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Chi tiết sách
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Book' } } } }
        '404': { description: Not found }
    put:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Cập nhật sách
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookCreate' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Book' } } } }
        '404': { description: Not found }
        '400': { description: Validation error }
    patch:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookCreate' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Book' } } } }
        '404': { description: Not found }
    delete:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      responses:
        '204': { description: No content }
        '404': { description: Not found }

  /api/books/{id}/update_stock/:
    post:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Cập nhật tồn kho (cộng/trừ quantity)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, description: "Số lượng cộng (dương) hoặc trừ (âm)" }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Book' } } } }
        '400': { description: Quantity required / must be number / Insufficient stock }
        '404': { description: Not found }

  /api/categories/:
    get:
      tags: [Book]
      servers: [{ url: http://localhost:8003 }]
      summary: Danh sách thể loại
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }
