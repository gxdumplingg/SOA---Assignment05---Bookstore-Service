        '404': { description: Not found }
    put:
      tags: [Staff]
      servers: [{ url: http://localhost:8004 }]
      summary: Cập nhật nhân viên (full)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Staff' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Staff' } } } }
