  # ========== RECOMMENDER AI SERVICE (8011) ==========
  /api/recommendations/:
    get:
      tags: [Recommender]
      servers: [{ url: http://localhost:8011 }]
      summary: Gợi ý sách (theo điểm đánh giá trung bình)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 5 }
          description: Số lượng sách gợi ý tối đa
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    book_id: { type: integer }
                    title: { type: string }
                    score: { type: number, format: float }
        '502': { description: "Lỗi khi lấy dữ liệu nguồn" }
        '503': { description: "Không kết nối được tới services" }

  /api/recommendations/{customer_id}/:
